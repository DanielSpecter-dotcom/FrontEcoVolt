<div class="verify-container">
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="verify-card">
    <!-- Logo -->
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="logo-icon">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span>EcoVolt</span>
    </div>

    <div class="card-header">
      <h2>Verificar tu cuenta</h2>
      <p class="subtitle">
        Ingresa el código numérico de 6 dígitos que enviamos a tu correo para activar tu cuenta.
      </p>
      <div class="email-badge" *ngIf="email">
        {{ email }}
      </div>
    </div>

    <!-- Alert Boxes -->
    <div class="error-box" *ngIf="errorMessage">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="error-icon">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <div class="success-box" *ngIf="successMessage">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="success-icon"><polyline points="20 6 9 17 4 12"/></svg>
      <span>{{ successMessage }}</span>
    </div>

    <form (ngSubmit)="onSubmit()">
      <!-- OTP Code Input -->
      <div class="form-group">
        <label for="verificationCode">Código de Verificación</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="verificationCode" 
            placeholder="Ej. 123456" 
            [(ngModel)]="code" 
            name="code" 
            maxlength="6" 
            pattern="[0-9]{6}" 
            required
            autocomplete="one-time-code">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="input-icon">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <!-- Actions -->
      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Verificar Cuenta</span>
        <span *ngIf="isLoading" class="loader">Verificando...</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-arrow" *ngIf="!isLoading">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </form>

    <div class="resend-wrapper">
      <p>¿No recibiste el código?</p>
      <button type="button" class="btn-resend" (click)="resendCode()" [disabled]="isLoading">
        Reenviar código por correo
      </button>
    </div>

    <div class="card-footer">
      <a routerLink="/login" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="back-arrow-icon">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Volver a Iniciar Sesión
      </a>
    </div>
  </div>
</div>
